name: Sync Goozapp Streams

on:
  schedule:
    # প্রতি ১০ মিনিট পর পর স্বয়ংক্রিয়ভাবে স্ক্রিপ্টটি রান হবে
    - cron: '*/10 * * * *'
  workflow_dispatch: # চাইলে গিটহাব থেকে ম্যানুয়ালি রান করার অপশন

jobs:
  sync-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Sync Script
      env:
        # গিটহাব সিক্রেটস থেকে ক্রেডেনশিয়াল এবং ডাটাবেজ ইউআরএল লোড করা হচ্ছে
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
        GOOZAPP_API_URL: "https://all-rounder-two.vercel.app/Goozapp"
      run: python sync_script.py
